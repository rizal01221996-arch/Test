version: 2.1

jobs:
  build:
    docker:
      - image: cimg/python:3.10-browsers
    steps:
      - checkout
      - run:
          name: Install Tor and Privoxy
          command: |
            sudo apt-get update
            sudo apt-get install -y tor privoxy
            echo "forward-socks5t / 127.0.0.1:9050 ." | sudo tee -a /etc/privoxy/config
            sudo service tor start
            sudo service privoxy start
      - run:
          name: Install Dependencies
          command: pip install selenium
      - run:
          name: Run Bot
          command: |
            chmod +x start.sh
            ./start.sh
      
      # 🔄 RE-RUN JALUR TUNGGAL AUTOMATIS
      - run:
          name: Auto Trigger New Workflow (On Success or Failure)
          when: always
          command: |
            echo "🤖 Prosedur selesai/gagal. Memicu putaran berikutnya..."
            
            # Menggunakan token yang kamu berikan secara langsung agar pasti tembus API
            curl -X POST "https://circleci.com/api/v2/project/gh/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/pipeline" \
              -H "Circle-Token: CCIPAT_4xUgAQc4VqWVfQ7QPwSCHs_c0bf752cc6709844b4c1530da91c7e07b1546ccf" \
              -H "Content-Type: application/json" \
              -d "{\"branch\": \"${CIRCLE_BRANCH}\"}"
              
            echo "✅ Putaran estafet berikutnya berhasil masuk antrean."

workflows:
  main_workflow:
    jobs:
      - build
