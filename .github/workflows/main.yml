￼Enter name: Manual Mode

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Google Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y wget curl unzip
        wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        sudo apt install -y ./google-chrome-stable_current_amd64.deb

    - name: Install Virtual Display (Xvfb)
      run: |
        sudo apt-get install -y xvfb

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium requests urllib3

    - name: Run bot
      env:
        PYTHONUNBUFFERED: "1"
      run: |
        xvfb-run --server-args="-screen 0 1920x1080x24" python -u bot.py

    - name: Hapus Riwayat Workflows Lama (Sukses & Gagal)
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 0
        keep_minimum_runs: 1

    - name: Trigger Rerun Otomatis
      if: always()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "🔄 Memulai ulang workflow secara otomatis..."
        WORKFLOW_FILE=$(basename "${{ github.workflow_ref }}" | cut -d'@' -f1)
        echo "Nama file workflow terdeteksi: $WORKFLOW_FILE"
        gh workflow run "$WORKFLOW_FILE" --repo "${{ github.repository }}"
